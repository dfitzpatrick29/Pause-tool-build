<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause Extension</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="popup-container">
        <h1>Pause</h1>
        <p>Why are you opening this website?</p>
        <textarea id="response" placeholder="Type your response here..."></textarea>
        <button id="submit-response">Submit</button>
        <button id="manage-blocked-sites">Manage Blocked Sites</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
