<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:               #f0ede8;
      --surface:          #e8e4de;
      --surface-raised:   #dedad3;
      --text-primary:     #2c2b29;
      --text-secondary:   #7a776f;
      --text-muted:       #a8a49c;
      --border:           #d4cfc8;
      --btn-bg:           #2c2b29;
      --btn-text:         #f0ede8;
      --btn-ghost-border: #b0aba2;
      --btn-ghost-text:   #5a5750;
      --danger:           #8b3a3a;
      --radius:           3px;
      --transition:       400ms ease;
      --font:             "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      --font-ui:          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #stage {
      width: 100%;
      max-width: 460px;
      padding: 2rem;
      text-align: center;
      position: relative;
    }

    .view {
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      padding: 2rem;
    }

    .view.active {
      opacity: 1;
      pointer-events: auto;
      position: relative;
      top: auto; left: auto;
      transform: none;
      padding: 0;
    }

    /* ── Typography ── */
    .wordmark {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: var(--font-ui);
      margin-bottom: 0.6rem;
      font-weight: 400;
    }

    .headline {
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.55;
      margin-bottom: 0.6rem;
      font-style: italic;
    }

    .site-name {
      font-size: 0.95rem;
      font-family: var(--font-ui);
      color: var(--text-secondary);
      margin-bottom: 2rem;
      word-break: break-all;
    }

    .subtext {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 2rem;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      padding: 0.65rem 1.8rem;
      transition: opacity 200ms ease, background 200ms ease;
      -webkit-font-smoothing: antialiased;
      outline: none;
      line-height: 1;
    }

    .btn:focus-visible { outline: 2px solid var(--text-muted); outline-offset: 3px; }
    .btn-primary { background: var(--btn-bg); color: var(--btn-text); border-color: var(--btn-bg); }
    .btn-primary:hover { opacity: 0.82; }
    .btn-ghost { background: transparent; color: var(--btn-ghost-text); border-color: var(--btn-ghost-border); }
    .btn-ghost:hover { background: var(--surface); }
    .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: #f9efef; }
    .btn-sm { padding: 0.4rem 1rem; font-size: 0.78rem; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    /* ── Text input ── */
    .reason-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text-primary);
      padding: 0.85rem 1rem;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 200ms ease;
      line-height: 1.5;
    }

    .reason-input:focus { border-color: var(--text-muted); }
    .reason-input::placeholder { color: var(--text-muted); font-style: italic; }

    /* ── Divider ── */
    .divider { width: 2rem; height: 1px; background: var(--border); margin: 0 auto 1.8rem; }

    /* ── Blocked sites panel ── */
    #view-blocked { text-align: left; }

    .panel-title {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: var(--font-ui);
      color: var(--text-muted);
      margin-bottom: 1.4rem;
      text-align: center;
    }

    .add-site-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.4rem;
    }

    .add-site-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--text-primary);
      padding: 0.55rem 0.8rem;
      outline: none;
      transition: border-color 200ms ease;
    }

    .add-site-input:focus { border-color: var(--text-muted); }
    .add-site-input::placeholder { color: var(--text-muted); }

    .sites-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 1.4rem;
      padding-right: 2px;
    }

    .site-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.55rem 0.8rem;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .site-item span { word-break: break-all; flex: 1; padding-right: 0.5rem; }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.2rem;
      transition: color 200ms ease;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: var(--danger); }

    .empty-note {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-family: var(--font-ui);
      text-align: center;
      padding: 1rem 0;
    }

    /* ── Entry log panel ── */
    #view-log { text-align: left; }

    .log-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 1.4rem;
    }

    .log-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }

    .log-site {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    .log-reason {
      font-size: 0.95rem;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .log-time {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }

    /* ── Ack ── */
    #ack-message {
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
<div id="stage">

  <!-- ── View 1: Pause / Why are you here? ───────────────────── -->
  <div id="view-entry" class="view active">
    <div class="top-bar">
      <button class="btn btn-ghost btn-sm" id="btn-open-blocked">Blocked Sites</button>
    </div>
    <p class="wordmark">Pause</p>
    <div class="divider"></div>
    <p class="headline">Why are you opening</p>
    <p class="site-name" id="current-site">this page?</p>
    <textarea
      class="reason-input"
      id="reason-input"
      placeholder="Write your reason here…"
    ></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-submit">Submit &amp; Continue</button>
      <button class="btn btn-ghost"   id="btn-view-log">View Past Reasons</button>
    </div>
  </div>

  <!-- ── View 2: Blocked Sites Manager ──────────────────────── -->
  <div id="view-blocked" class="view">
    <p class="panel-title">Blocked Sites</p>
    <div class="add-site-row">
      <input
        class="add-site-input"
        id="add-site-input"
        type="text"
        placeholder="e.g. reddit.com"
      />
      <button class="btn btn-primary btn-sm" id="btn-add-site">Add</button>
    </div>
    <ul class="sites-list" id="sites-list"></ul>
    <div class="btn-row">
      <button class="btn btn-ghost btn-sm" id="btn-back-from-blocked">← Back</button>
    </div>
  </div>

  <!-- ── View 3: Past Reasons Log ───────────────────────────── -->
  <div id="view-log" class="view">
    <p class="panel-title">Past Reasons</p>
    <ul class="log-list" id="log-list"></ul>
    <div class="btn-row">
      <button class="btn btn-ghost btn-sm"   id="btn-back-from-log">← Back</button>
      <button class="btn btn-danger btn-sm"  id="btn-clear-log">Clear All</button>
    </div>
  </div>

  <!-- ── View 4: Acknowledgement ────────────────────────────── -->
  <div id="view-ack" class="view">
    <p id="ack-message">Reason noted. Carry on.</p>
  </div>

</div>

<script>
  /* ─────────────────────────────────────────────────────────────
     Pause — Chrome Extension popup logic
     Stores blocked sites and reason log in localStorage
     (will migrate to chrome.storage once packaged as extension)
  ───────────────────────────────────────────────────────────── */

  const FADE   = 400;
  const ACK_MS = 2000;

  /* ── Storage helpers ── */
  function loadBlockedSites() {
    return JSON.parse(localStorage.getItem('pause_blocked') || '[]');
  }
  function saveBlockedSites(arr) {
    localStorage.setItem('pause_blocked', JSON.stringify(arr));
  }
  function loadLog() {
    return JSON.parse(localStorage.getItem('pause_log') || '[]');
  }
  function saveLog(arr) {
    localStorage.setItem('pause_log', JSON.stringify(arr));
  }

  /* ── Current site detection ── */
  /* In a real extension this comes from chrome.tabs; here we use referrer or a placeholder */
  function getCurrentSite() {
    if (document.referrer) {
      try { return new URL(document.referrer).hostname; } catch (_) {}
    }
    return window.location.hostname || 'this page';
  }

  /* ── DOM refs ── */
  const views = {
    entry:   document.getElementById('view-entry'),
    blocked: document.getElementById('view-blocked'),
    log:     document.getElementById('view-log'),
    ack:     document.getElementById('view-ack'),
  };

  const currentSiteEl   = document.getElementById('current-site');
  const reasonInput     = document.getElementById('reason-input');
  const btnSubmit       = document.getElementById('btn-submit');
  const btnViewLog      = document.getElementById('btn-view-log');
  const btnOpenBlocked  = document.getElementById('btn-open-blocked');
  const btnBackBlocked  = document.getElementById('btn-back-from-blocked');
  const btnBackLog      = document.getElementById('btn-back-from-log');
  const btnClearLog     = document.getElementById('btn-clear-log');
  const addSiteInput    = document.getElementById('add-site-input');
  const btnAddSite      = document.getElementById('btn-add-site');
  const sitesList       = document.getElementById('sites-list');
  const logList         = document.getElementById('log-list');
  const ackMessage      = document.getElementById('ack-message');

  let ackTimeout = null;

  /* ── View transition ── */
  function showView(id) {
    const current = document.querySelector('.view.active');
    const next    = views[id];
    if (current === next) return;

    if (current) {
      current.style.opacity = '0';
      current.style.pointerEvents = 'none';
      setTimeout(() => {
        current.classList.remove('active');
        current.style.opacity = '';
      }, FADE);
    }

    setTimeout(() => { next.classList.add('active'); }, FADE * 0.6);
  }

  /* ── Populate current site ── */
  currentSiteEl.textContent = getCurrentSite() + '?';

  /* ── Render blocked sites list ── */
  function renderBlockedSites() {
    const sites = loadBlockedSites();
    sitesList.innerHTML = '';

    if (sites.length === 0) {
      sitesList.innerHTML = '<p class="empty-note">No blocked sites yet.</p>';
      return;
    }

    sites.forEach((site, i) => {
      const li  = document.createElement('li');
      li.className = 'site-item';

      const span = document.createElement('span');
      span.textContent = site;

      const btn = document.createElement('button');
      btn.className   = 'remove-btn';
      btn.textContent = '×';
      btn.title       = 'Remove';
      btn.addEventListener('click', () => {
        const updated = loadBlockedSites().filter((_, idx) => idx !== i);
        saveBlockedSites(updated);
        renderBlockedSites();
      });

      li.appendChild(span);
      li.appendChild(btn);
      sitesList.appendChild(li);
    });
  }

  /* ── Render reason log ── */
  function renderLog() {
    const entries = loadLog();
    logList.innerHTML = '';

    if (entries.length === 0) {
      logList.innerHTML = '<p class="empty-note">No reasons recorded yet.</p>';
      return;
    }

    /* Show newest first */
    [...entries].reverse().forEach(entry => {
      const li = document.createElement('li');
      li.className = 'log-item';
      li.innerHTML = `
        <div class="log-site">${entry.site}</div>
        <div class="log-reason">${escapeHtml(entry.reason)}</div>
        <div class="log-time">${entry.time}</div>
      `;
      logList.appendChild(li);
    });
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Add site ── */
  function addSite() {
    const val = addSiteInput.value.trim().toLowerCase().replace(/^https?:\/\//, '');
    if (!val) return;

    const sites = loadBlockedSites();
    if (!sites.includes(val)) {
      sites.push(val);
      saveBlockedSites(sites);
    }

    addSiteInput.value = '';
    renderBlockedSites();
  }

  btnAddSite.addEventListener('click', addSite);
  addSiteInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSite(); });

  /* ── Submit reason ── */
  btnSubmit.addEventListener('click', () => {
    const reason = reasonInput.value.trim();
    const site   = getCurrentSite();

    /* Save even if blank — records the visit */
    const entries = loadLog();
    entries.push({
      site,
      reason: reason || '(no reason given)',
      time: new Date().toLocaleString(),
    });
    saveLog(entries);

    ackMessage.textContent = reason
      ? 'Reason noted. Carry on.'
      : 'No reason given — noted.';

    reasonInput.value = '';
    showView('ack');

    clearTimeout(ackTimeout);
    ackTimeout = setTimeout(() => showView('entry'), ACK_MS);
  });

  /* ── View log ── */
  btnViewLog.addEventListener('click', () => {
    renderLog();
    showView('log');
  });

  /* ── Open blocked sites ── */
  btnOpenBlocked.addEventListener('click', () => {
    renderBlockedSites();
    showView('blocked');
  });

  /* ── Back buttons ── */
  btnBackBlocked.addEventListener('click', () => showView('entry'));
  btnBackLog.addEventListener('click',     () => showView('entry'));

  /* ── Clear log ── */
  btnClearLog.addEventListener('click', () => {
    if (confirm('Clear all recorded reasons?')) {
      saveLog([]);
      renderLog();
    }
  });
</script>
</body>
</html>
